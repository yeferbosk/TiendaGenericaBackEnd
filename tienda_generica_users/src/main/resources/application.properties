spring.application.name=users
# =====================================================
# CONFIGURACI”N DEL SERVIDOR
# =====================================================
server.port=8081
server.servlet.context-path=/api/usuarios

# =====================================================
# CONFIGURACI”N DE LA BASE DE DATOS
# =====================================================
spring.datasource.url=jdbc:mysql://localhost:3306/tienda_generica_users?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=(contraseÒa)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# CONFIGURACI”N DE JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true